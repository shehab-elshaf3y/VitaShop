<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة تسجيل ومتابعة الحالات</title>
    <style>
        /* الألوان الرئيسية: الأبيض والأخضر النظيف */
        :root {
            --primary-green: #047857; /* أخضر زمردي احترافي */
            --dark-green: #065f46;
            --light-green: #e6f4ea;
            --bg-white: #ffffff;
            --border-color: #a7f3d0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f5;
            color: #2d3748;
            margin: 0;
            padding: 0;
        }

        /* --- شاشة الترحيب الافتتاحية --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.5s ease;
        }
        .splash-content {
            text-align: center;
            padding: 20px;
        }
        .splash-logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
        }
        .splash-title {
            color: var(--primary-green);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .splash-subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .enter-btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(4, 120, 87, 0.2);
            transition: background 0.3s;
        }
        .enter-btn:hover {
            background-color: var(--dark-green);
        }

        /* --- الواجهة الرئيسية للفورم --- */
        #main-content {
            display: none; /* مخفي في البداية حتى يتم الضغط على زر الترحيب */
            padding: 20px 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-container {
            background: var(--bg-white);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border-top: 5px solid var(--primary-green);
        }
        
        /* لوجو الشركة أعلى الفورم */
        .company-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .company-logo {
            max-width: 180px;
            height: auto;
        }

        .form-section {
            background-color: #fafbfc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #edf2f7;
        }
        .section-title {
            font-size: 13px;
            color: var(--primary-green);
            font-weight: bold;
            margin-bottom: 15px;
            border-right: 3px solid var(--primary-green);
            padding-right: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #2d3748;
        }
        input, select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fff;
            transition: all 0.2s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.1);
            background-color: #fff;
        }
        
        /* زر الحفظ النهائي */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(4, 120, 87, 0.15);
        }
        .submit-btn:hover {
            background-color: var(--dark-green);
        }
        .submit-btn:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-content">
        <img class="splash-logo" src="https://via.placeholder.com/150/047857/FFFFFF?text=COMPANY+LOGO" alt="Company Logo">
        <div class="splash-title">أهلاً بك في منظومة العمليات</div>
        <div class="splash-subtitle">شركة إدارة ومتابعة الحالات الطبية والآلات</div>
        <button class="enter-btn" onclick="startApp()">الدخول إلى النظام</button>
    </div>
</div>

<div id="main-content">
    <div class="form-container">
        
        <div class="company-header">
            <img class="company-logo" src="https://via.placeholder.com/180/047857/FFFFFF?text=COMPANY+LOGO" alt="Company Header">
        </div>

        <form id="operationForm">
            
            <div class="form-section">
                <div class="section-title">البيانات الأساسية | Basic Info</div>
                
                <div class="form-group">
                    <label>تاريخ خروج</label>
                    <input type="date" name="exitDate" required>
                </div>

                <div class="form-group">
                    <label>نوع الحالة</label>
                    <select name="caseType" required>
                        <option value="">اختر نوع الحالة</option>
                        <option value="HIP">HIP</option>
                        <option value="KNEE">KNEE</option>
                        <option value="BIPOLAR">BIPOLAR</option>
                        <option value="TRIPOL6">TRIPOL6</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>رقم العملية (OP)</label>
                    <input type="text" name="opNumber" placeholder="سجل رقم الـ OP يدوياً" required>
                </div>

                <div class="form-group">
                    <label>اسم الشخص (المسجِّل)</label>
                    <input type="text" name="personName" placeholder="اكتب اسمك هنا يدوياً" required>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">التحضير والتوصيل | Prep & Delivery</div>

                <div class="form-group">
                    <label>تحضير استوك</label>
                    <select name="stockPrep">
                        <option value="">اختر المسؤول</option>
                        <option value="أشرف">أشرف</option>
                        <option value="محمود">محمود</option>
                        <option value="عمر">عمر</option>
                        <option value="بلال">بلال</option>
                        <option value="قطب">قطب</option>
                        <option value="مغاوري">مغاوري</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>تحضير آلات</label>
                    <select name="toolPrep">
                        <option value="">اختر المسؤول</option>
                        <option value="أشرف">أشرف</option>
                        <option value="محمود">محمود</option>
                        <option value="عمر">عمر</option>
                        <option value="بلال">بلال</option>
                        <option value="قطب">قطب</option>
                        <option value="مغاوري">مغاوري</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>توصيل الحالة</label>
                    <select name="delivery">
                        <option value="">اختر المسؤول</option>
                        <option value="أشرف">أشرف</option>
                        <option value="محمود">محمود</option>
                        <option value="عمر">عمر</option>
                        <option value="بلال">بلال</option>
                        <option value="قطب">قطب</option>
                        <option value="مغاوري">مغاوري</option>
                    </select>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">العودة والمراجعة | Return & Review</div>

                <div class="form-group">
                    <label>تاريخ عودة</label>
                    <input type="date" name="returnDate">
                </div>

                <div class="form-group">
                    <label>إرجاع الحالة</label>
                    <select name="caseReturn">
                        <option value="">اختر المسؤول</option>
                        <option value="أشرف">أشرف</option>
                        <option value="محمود">محمود</option>
                        <option value="عمر">عمر</option>
                        <option value="بلال">بلال</option>
                        <option value="قطب">قطب</option>
                        <option value="مغاوري">مغاوري</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>مراجعة استوك</label>
                    <select name="stockReview">
                        <option value="">اختر المسؤول</option>
                        <option value="أشرف">أشرف</option>
                        <option value="محمود">محمود</option>
                        <option value="عمر">عمر</option>
                        <option value="بلال">بلال</option>
                        <option value="قطب">قطب</option>
                        <option value="مغاوري">مغاوري</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>مراجعة آلات</label>
                    <select name="toolReview">
                        <option value="">اختر المسؤول</option>
                        <option value="أشرف">أشرف</option>
                        <option value="محمود">محمود</option>
                        <option value="عمر">عمر</option>
                        <option value="بلال">بلال</option>
                        <option value="قطب">قطب</option>
                        <option value="مغاوري">مغاوري</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">تأكيد الحفظ وإرسال البيانات</button>
        </form>
    </div>
</div>

<script>
    // انتقال من صفحة الترحيب للفورم الرئيسي عند الضغط على الزر
    function startApp() {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }, 500);
    }

    // ضع رابط الـ Web app URL الجديد والخاص بك بجوجل هنا بين علامتي التنصيص بالأسفل
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx0jJ-BczdmjacKaPTTMpTOM_rVm7BaIZQ7hG7TL7Ghgz7wOCie8imdkM_6q5fZsPe2/exec';

    const form = document.getElementById('operationForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'جاري الحفظ في الجوجل شيت...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('تم تسجيل العملية بنجاح في المنظومة الرقمية!');
                form.reset();
                btn.disabled = false;
                btn.innerText = 'تأكيد الحفظ وإرسال البيانات';
            })
            .catch(error => {
                alert('حدث خطأ أثناء الإرسال، برجاء المحاولة مرة أخرى.');
                console.error('Error!', error.message);
                btn.disabled = false;
                btn.innerText = 'تأكيد الحفظ وإرسال البيانات';
            });
    });
</script>

</body>
</html>
