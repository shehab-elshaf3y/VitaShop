<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة تسجيل ومتابعة الحالات</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Vita Shop">
    <meta name="apple-mobile-web-app-status-bar-style" content="#047857">

    <style>
        :root {
            --primary-green: #047857; 
            --dark-green: #065f46;
            --light-green: #e6f4ea;
            --bg-white: #ffffff;
            --border-color: #a7f3d0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f5;
            color: #2d3748;
            margin: 0;
            padding: 0;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.5s ease;
        }
        .splash-content {
            text-align: center;
            padding: 20px;
        }
        .splash-logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 12px;
            object-fit: contain;
        }
        .splash-title {
            color: var(--primary-green);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .splash-subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .enter-btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(4, 120, 87, 0.2);
            transition: background 0.3s;
        }
        .enter-btn:hover {
            background-color: var(--dark-green);
        }

        #main-content {
            display: none;
            padding: 20px 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-container {
            background: var(--bg-white);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border-top: 5px solid var(--primary-green);
        }
        
        .company-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .company-logo {
            max-width: 180px;
            height: auto;
        }

        .form-section {
            background-color: #fafbfc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #edf2f7;
        }
        .section-title {
            font-size: 13px;
            color: var(--primary-green);
            font-weight: bold;
            margin-bottom: 15px;
            border-right: 3px solid var(--primary-green);
            padding-right: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #2d3748;
        }
        input, select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fff;
            transition: all 0.2s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.1);
            background-color: #fff;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(4, 120, 87, 0.15);
        }
        .submit-btn:hover {
            background-color: var(--dark-green);
        }
        .submit-btn:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-content">
        <img class="splash-logo" src="logo.png" alt="Company Logo">
        <div class="splash-title">Welcome to Vita Shop</div>
        <div class="splash-subtitle">Vital products for vital life</div>
        <button class="enter-btn" onclick="startApp()">الدخول إلى النظام</button>
    </div>
</div>

<div id="main-content">
    <div class="form-container">
        
        <div class="company-header">
            <img class="company-logo" src="logo.png" alt="Company Header">
        </div>

        <form id="operationForm">
            
            <div class="form-section">
                <div class="section-title">البيانات الأساسية | Basic Info</div>
                
                <div class="form-group">
                    <label>تاريخ العملية</label>
                    <input type="date" name="exitDate" required>
                </div>

                <div class="form-group">
                    <label>نوع الحالة</label>
                    <select name="caseType" required>
                        <option value="">اختر نوع الحالة</option>
                        <option value="HIP">HIP</option>
                        <option value="KNEE">KNEE</option>
                        <option value="BIPOLAR">BIPOLAR</option>
                        <option value="TRIPOLAR">TRIPOLAR</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>رقم العملية (OP)</label>
                    <input type="text" name="opNumber" placeholder="سجل رقم الـ OP يدوياً" required>
                </div>

                <div class="form-group">
                    <label>اسم المستشفى</label>
                    <input type="text" name="hospitalName" placeholder="اكتب اسم المستشفى هنا" required>
                </div>

                <!-- تم تنظيف الأسماء من أي مسافات زائدة في الخلف لضمان مطابقة الـ Apps Script -->
                <div class="form-group">
                    <label>اسم الشخص (المسجِّل)</label>
                    <select name="personName" required>
                        <option value="">اختر اسمك من القائمة</option>
                        <option value="أ:بلال">أ:بلال</option>
                        <option value="أ:عمر">أ:عمر</option>
                        <option value="أ:شهاب">أ:شهاب</option>
                        <option value="أ:محمود">أ:محمود</option>
                        <option value="أ:أحمد أشرف">أ:أحمد أشرف</option>
                        <option value="أ:مغاوري">أ:مغاوري</option>
                        <option value="أ:قطب">أ:قطب</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>الرقم السري الخاص بك (PIN)</label>
                    <!-- التعديل بجعل الحد الأقصى والأدنى 6 خانات -->
<input type="password" id="pinInput" minlength="6" maxlength="6" pattern="\d{6}" placeholder="أدخل الرقم السري المكون من 6 أرقام" required>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">نوع الرحلة | Trip Type</div>
                <div class="form-group">
                    <label>نوع الرحلة</label>
                    <select name="caseReturn" required>
                        <option value="">اختر من القائمة</option>
                        <option value="تحضير">تحضير</option>
                        <option value="توصيل">توصيل</option>
                        <option value="مراجعة">مراجعة</option>
                        <option value="عودة">عودة</option>
                    </select>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">نوع المهمة | Task Type</div>
                <div class="form-group">
                    <label>نوع المهمة</label>
                    <select name="stockPrep" required>
                        <option value="">اختر من القائمة</option>
                        <option value="تحضير استوك">تحضير استوك</option>
                        <option value="تحضير الات">تحضير الات</option>
                        <option value="توصيل حالة">توصيل حالة</option>
                        <option value="إرجاع حالة">إرجاع حالة</option>
                        <option value="مراجعة ستوك">مراجعة ستوك</option>
                        <option value="مراجعة الات">مراجعة الات</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">تأكيد الحفظ وإرسال البيانات</button>
        </form>
    </div>
</div>

<script>
    function startApp() {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(function() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }, 500);
    }

    // ✅ تم إصلاح الرابط برمجياً ليكون سطر واحد مستقيم وبدون أخطاء
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwXGyftE7MtDAFWtnC3CB3aaoDrbdOtKlWhdF0ZP0c8vdypdk3zcT1rIxfYpXkt0qC8/exec';

    const form = document.getElementById('operationForm');
    const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', function(e) {
  e.preventDefault();
  
  // قراءة الرقم السري بالـ ID مباشرة (تأكد أن الـ ID في الـ HTML عندك هو pinInput أو عدله هنا)
  const pinInput = document.getElementById('pinInput') || document.getElementById('pin');
  const pinValue = pinInput ? pinInput.value.trim() : "";
  
  // شرط الفحص الصارم
  if (pinValue.length !== 6) {
    alert('❌ عذراً، يجب أن يتكون الرقم السري من 6 أرقام بالظبط!');
    return; // يوقف الإرسال فوراً
  }
  
  // لو تمام ومكون من 6 خانات، يكمل الإرسال طبيعي
  btn.disabled = true;
  btn.innerText = '🔄 جاري التحقق الأمني وحفظ البيانات...';
  
  const formData = new FormData(form);
  fetch(scriptURL, { method: 'POST', body: formData })
  // ... باقي كود الـ fetch بتاعك زي ما هو تحت
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.result === 'success') {
                    alert('✅ ممتاز! تم التحقق من هويتك وتسجيل المهمة بنجاح وحفظ النسبة الخاصة بك.');
                    form.reset();
                } else if (data.result === 'invalid_pin') {
                    alert('❌ خطأ أمني: الرقم السري (PIN) الخاص بهذا الاسم غير صحيح! يرجى إعادة المحاولة.');
                } else if (data.result === 'invalid_op') {
                    alert('❌ خطأ: رقم الـ OP هذا غير مدرج في جدول الأرقام المعتمدة!');
                } else if (data.result === 'dispute_detected') {
                    alert('⚠️ تنبيه أمني عاجل:\n\nهذه المهمة مسجلة بالفعل باسم زميل آخر في المنظومة!\n\nتم قبول إدخالك وحفظه، وتلقائياً تم إرسال إشعار فوري للإدارة عبر تليجرام، وتم تحويل حالة المهمة بالكامل تحت بند (تكرار ونزاع علني) لمراجعة الأوراق وتحديد صاحب النسبة.');
                    form.reset();
                } else {
                    alert('حدث خطأ غير متوقع، يرجى المحاولة لاحقاً.');
                }
                btn.disabled = false;
                btn.innerText = 'تأكيد الحفظ وإرسال البيانات';
            })
            .catch(function(error) {
                alert('حدث خطأ أثناء الاتصال بالخادم، برجاء المحاولة مرة أخرى.');
                console.error('Error!', error.message);
                btn.disabled = false;
                btn.innerText = 'تأكيد الحفظ وإرسال البيانات';
            });
    });
</script>

</body>
</html>
